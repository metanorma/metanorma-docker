name: env-probe-enotsock

# Cheap proof experiments for the ltsc2025 Ruby ENOTSOCK environment fix.
# No ~2h image build — each job is a single `docker run` (~5-10 min): it does ONE
# Net::HTTP HTTPS request and prints `RESULT: <code>` or `RESULT: FAIL <Errno>`.
# Exp1 isolates the CONTAINER VERSION (ltsc2022 vs ltsc2025, same Ruby).
# Exp2 isolates the RUBY BUILD (mswin vs ucrt vs mingw, same ltsc2025).
# Auto-runs on push of THIS file (workflow_dispatch only works once a workflow is
# on the default branch). Delete once the fix is chosen.
on:
  push:
    paths:
      - '.github/workflows/env-probe.yml'
  workflow_dispatch:

jobs:
  exp1-container-version:
    name: "Exp1 ${{ matrix.base }}"
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        base:
          - "mcr.microsoft.com/windows/servercore:ltsc2022"
          - "mcr.microsoft.com/windows/servercore:ltsc2025"
    steps:
      - name: Net::HTTP HTTPS probe (same Ruby 3.4.9.1; only container year varies)
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/probe.ps1 <<'PS1'
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = 3072
          Set-ExecutionPolicy Bypass -Scope Process -Force
          Invoke-Expression ((New-Object Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          choco install -y ruby --version=3.4.9.1 | Out-Null
          $env:Path = 'C:\tools\ruby34\bin;' + $env:Path
          ruby -ropen-uri -e 'begin; print "RESULT: "; puts URI.open("https://rubygems.org/").status.inspect; rescue => e; puts "FAIL " + e.class.to_s + " - " + e.message; end'
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm --isolation=process \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            ${{ matrix.base }} \
            powershell -ExecutionPolicy Bypass -File C:/probe/probe.ps1

  exp2-ruby-build:
    name: "Exp2 ${{ matrix.build }} on ltsc2025"
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        build: [ruby-mswin, ruby-ucrt, ruby-mingw]
    steps:
      - name: Net::HTTP HTTPS probe (stock ltsc2025; only the Ruby build varies)
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/probe.ps1 <<'PS1'
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = 3072
          Invoke-WebRequest "https://github.com/MSP-Greg/ruby-loco/releases/download/ruby-master/${{ matrix.build }}.7z" -OutFile C:\r.7z -UseBasicParsing
          Invoke-WebRequest "https://www.7-zip.org/a/7zr.exe" -OutFile C:\7zr.exe -UseBasicParsing
          & C:\7zr.exe x C:\r.7z -oC:\rb | Out-Null
          $e = (Get-ChildItem -Recurse C:\rb -Filter ruby.exe | Select-Object -First 1).FullName
          Write-Host ("ruby.exe: " + $e)
          & $e -e 'begin; require "net/http"; require "uri"; print "RESULT: "; puts Net::HTTP.get_response(URI("https://github.com")).code; rescue => x; puts "FAIL " + x.class.to_s; end'
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            mcr.microsoft.com/windows/servercore:ltsc2025 \
            powershell -ExecutionPolicy Bypass -File C:/probe/probe.ps1
