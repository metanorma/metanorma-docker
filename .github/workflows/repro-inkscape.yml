name: repro-inkscape

# Verify the Inkscape fix on the PUBLISHED Windows image (~10 min, no 2h build).
# Root cause (proven): Inkscape 1.4.4 imports OPENGL32.dll at load time, but Windows
# Server Core ships NO OpenGL -> inkscape can't start (exit -1073741515 STATUS_DLL_NOT_FOUND)
# -> SVG->EMF fails -> iho/ogc fail. The ext-ms-win-* "NOT_FOUND" are apiset false positives.
# Fix candidate: drop Mesa3D's software opengl32.dll into Inkscape\bin. This probe proves it:
#   BEFORE -> exit -1073741515, emf=False
#   AFTER (opengl32.dll present) -> exit 0, emf=True
on:
  push:
    paths:
      - '.github/workflows/repro-inkscape.yml'
  workflow_dispatch:

concurrency:
  group: repro-inkscape-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repro:
    name: "Inkscape OpenGL fix verify"
    runs-on: windows-2025
    steps:
      - name: Verify Mesa software OpenGL fixes inkscape SVG->EMF
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/run.ps1 <<'PS1'
          $ErrorActionPreference = 'Continue'
          [Net.ServicePointManager]::SecurityProtocol = 3072
          $bin = 'C:\Program Files\Inkscape\bin'
          '<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="red"/></svg>' | Set-Content C:\probe\t.svg
          function Conv($label, $out) {
            Remove-Item $out -ErrorAction SilentlyContinue
            $p = Start-Process -FilePath "$bin\inkscape.com" -ArgumentList '--export-type=emf', "--export-filename=$out", 'C:\probe\t.svg' -Wait -NoNewWindow -PassThru
            Write-Host ("  [$label] exit=$($p.ExitCode)  emf=" + (Test-Path $out))
          }
          Write-Host '=== BEFORE (no OpenGL) -> expect exit=-1073741515 emf=False ==='
          Conv 'before' 'C:\probe\before.emf'
          Write-Host '=== install 7zip + fetch Mesa3D software OpenGL ==='
          choco install -y 7zip 2>&1 | Select-String -Pattern "install|already" | Out-Host
          $rel = (Invoke-WebRequest 'https://api.github.com/repos/pal1000/mesa-dist-win/releases/latest' -UseBasicParsing -Headers @{'User-Agent'='ci'}).Content | ConvertFrom-Json
          $url = ($rel.assets | Where-Object { $_.name -match 'release-msvc\.7z$' } | Select-Object -First 1).browser_download_url
          Write-Host "mesa: $url"
          Invoke-WebRequest $url -OutFile C:\probe\mesa.7z -UseBasicParsing
          & 'C:\Program Files\7-Zip\7z.exe' x C:\probe\mesa.7z -oC:\probe\mesa -y | Out-Null
          $ogl = Get-ChildItem -Recurse C:\probe\mesa -Filter opengl32.dll -EA SilentlyContinue | Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1
          Write-Host ("opengl32.dll: " + $ogl.FullName)
          $md = $ogl.Directory.FullName
          Write-Host '=== AFTER opengl32.dll only -> expect exit=0 emf=True ==='
          Copy-Item "$md\opengl32.dll" "$bin\opengl32.dll" -Force
          Conv 'after-opengl32-only' 'C:\probe\after1.emf'
          Write-Host '=== AFTER all mesa x64 dlls (in case companions are needed) ==='
          Copy-Item "$md\*.dll" "$bin\" -Force
          Conv 'after-all-mesa' 'C:\probe\after2.emf'
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            metanorma/metanorma:windows-ltsc2025 \
            powershell -ExecutionPolicy Bypass -File C:/probe/run.ps1
