name: repro-inkscape

# Fast (~10 min) reproduction of the iho/ogc image-conversion failure on the
# PUBLISHED Windows image -- no 2h build. metanorma (vectory -> Ukiryu) shells out
# to inkscape.EXE for SVG->EMF, but on Windows inkscape.exe is the GUI launcher,
# which returns exit 0 WITHOUT producing the .emf (the CI signature). The console
# inkscape.com does the CLI work. Ukiryu's locator forces ".exe" on Windows
# (executable_locator.rb: "prioritizes .exe over .com"), so it picks the GUI one.
# This probe proves it on real Windows:
#   inkscape.exe / choco shim -> emf_created = False   (the bug)
#   inkscape.com              -> emf_created = True    (the fix direction)
on:
  push:
    paths:
      - '.github/workflows/repro-inkscape.yml'
  workflow_dispatch:

concurrency:
  group: repro-inkscape-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repro:
    name: "Inkscape SVG->EMF repro"
    runs-on: windows-2025
    steps:
      - name: inkscape.exe vs inkscape.com on the published image
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/run.ps1 <<'PS1'
          $ErrorActionPreference = 'Continue'
          function Try-Convert($exe, $out) {
            if (-not (Test-Path $exe)) { Write-Host "  MISSING: $exe"; return }
            Remove-Item $out -ErrorAction SilentlyContinue
            $p = Start-Process -FilePath $exe -ArgumentList '--export-type=emf', "--export-filename=$out", 'C:\probe\t.svg' -Wait -NoNewWindow -PassThru
            Write-Host ("  $exe   exit=$($p.ExitCode)  emf_created=" + (Test-Path $out))
          }
          Write-Host '=== where inkscape resolves (Ukiryu uses: where inkscape.exe) ==='
          where.exe inkscape 2>&1 | Out-Host
          where.exe inkscape.exe 2>&1 | Out-Host
          where.exe inkscape.com 2>&1 | Out-Host
          Write-Host '=== Inkscape install bin ==='
          Get-ChildItem 'C:\Program Files\Inkscape\bin\inkscape.*' -EA SilentlyContinue | Select-Object -ExpandProperty Name | Out-Host
          '<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="red"/></svg>' | Set-Content C:\probe\t.svg
          Write-Host '=== GUI inkscape.exe + choco shim (what Ukiryu picks) -> expect emf_created=False ==='
          Try-Convert 'C:\Program Files\Inkscape\bin\inkscape.exe' 'C:\probe\t_exe.emf'
          Try-Convert 'C:\ProgramData\chocolatey\bin\inkscape.exe' 'C:\probe\t_shim.emf'
          Write-Host '=== console inkscape.com -> expect emf_created=True ==='
          Try-Convert 'C:\Program Files\Inkscape\bin\inkscape.com' 'C:\probe\t_com.emf'
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            metanorma/metanorma:windows-ltsc2025 \
            powershell -ExecutionPolicy Bypass -File C:/probe/run.ps1
