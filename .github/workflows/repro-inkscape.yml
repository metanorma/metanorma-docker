name: repro-inkscape

# Fast (~10 min) diagnosis of the iho/ogc SVG->EMF failure on the PUBLISHED Windows
# image -- no 2h build. First probe proved it is NOT a GUI-vs-console issue: BOTH
# inkscape.exe AND inkscape.com exit with -1073741515 (0xC0000135 STATUS_DLL_NOT_FOUND)
# -- Inkscape can't even start, a runtime DLL is missing (the choco shim returns 0,
# masking it). This probe pinpoints/fixes the missing dependency:
#   - run from inkscape\bin (DLL-search-path check)
#   - check + install the VC++ redistributable, then retest
# Expect one of these to flip emf=True -> that's the Dockerfile fix.
on:
  push:
    paths:
      - '.github/workflows/repro-inkscape.yml'
  workflow_dispatch:

concurrency:
  group: repro-inkscape-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repro:
    name: "Inkscape SVG->EMF repro"
    runs-on: windows-2025
    steps:
      - name: Identify Inkscape's missing DLL via dependency walker
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/run.ps1 <<'PS1'
          $ErrorActionPreference = 'Continue'
          [Net.ServicePointManager]::SecurityProtocol = 3072
          $ink = 'C:\Program Files\Inkscape\bin\inkscape.exe'
          Write-Host ('=== inkscape version: ' + (Get-Item $ink).VersionInfo.ProductVersion + ' ===')
          Write-Host '=== fetch lucasg Dependencies (latest x64) ==='
          $rel = (Invoke-WebRequest 'https://api.github.com/repos/lucasg/Dependencies/releases/latest' -UseBasicParsing -Headers @{'User-Agent'='ci'}).Content | ConvertFrom-Json
          $url = ($rel.assets | Where-Object { $_.name -match 'x64_Release\.zip$' } | Select-Object -First 1).browser_download_url
          Write-Host "url: $url"
          Invoke-WebRequest $url -OutFile C:\probe\dep.zip -UseBasicParsing
          Expand-Archive C:\probe\dep.zip -DestinationPath C:\probe\dep -Force
          $dep = (Get-ChildItem -Recurse C:\probe\dep -Filter Dependencies.exe | Select-Object -First 1).FullName
          Write-Host "tool: $dep"
          Write-Host '=== NOT_FOUND modules in inkscape.exe dependency chain ==='
          & $dep -depth 3 -chain $ink 2>&1 | Select-String -Pattern "NOT_FOUND" | Select-Object -First 40 | Out-Host
          Write-Host '=== (fallback) direct imports listing ==='
          & $dep -modules $ink 2>&1 | Select-String -Pattern "NOT_FOUND|NotFound|Missing" | Select-Object -First 20 | Out-Host
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            metanorma/metanorma:windows-ltsc2025 \
            powershell -ExecutionPolicy Bypass -File C:/probe/run.ps1
