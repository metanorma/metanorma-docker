name: repro-down

# Verifies the UCRT-toolchain fix on the PUBLISHED image (~20 min, no 2h build):
# recompiles the transitive openssl gem with the correct UCRT toolchain (matching
# RubyInstaller's x64-mingw-ucrt Ruby) and confirms fontist's `Down` HTTPS download
# works — WITHOUT removing the gem, so `openssl ~> 3.3.2` stays satisfied (no
# Gem::MissingSpecError). Mirrors what the Dockerfile builder now does.
#   BEFORE: openssl gem as shipped (msvcrt)   -> expect RESULT: FAIL (ENOTSOCK)
#   AFTER:  openssl gem recompiled with UCRT  -> expect RESULT: OK  + `metanorma --version` works
on:
  push:
    paths:
      - '.github/workflows/repro-down.yml'
  workflow_dispatch:

concurrency:
  group: repro-down-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repro:
    name: "UCRT openssl rebuild repro"
    runs-on: windows-2025
    steps:
      - name: Recompile openssl with the UCRT toolchain and verify fontist Down
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/down_test.rb <<'RUBY'
          require "down"
          url = ARGV[0] || "https://gitlab.com/fontmirror/archive/-/raw/master/EUupdate.EXE"
          begin
            print "RESULT: "
            file = Down.download(url)
            puts "OK #{File.size(file.path)} bytes <- #{url}"
            file.close
          rescue Exception => e
            puts "FAIL #{e.class} - #{e.message}"
          end
          RUBY
          cat > probe_dir/run.ps1 <<'PS1'
          $ErrorActionPreference = 'Continue'
          [Net.ServicePointManager]::SecurityProtocol = 3072
          Write-Host '--- openssl gem (as shipped) ---'; gem list openssl
          Write-Host '=== BEFORE (msvcrt openssl gem): fontist Down path ==='
          ruby C:/probe/down_test.rb
          Write-Host '=== install msys2 + UCRT toolchain (mirrors the Dockerfile builder fix) ==='
          choco install -y msys2 | Out-Null
          $env:Path = 'C:\tools\msys64\usr\bin;C:\tools\msys64\ucrt64\bin;' + $env:Path
          C:\tools\msys64\usr\bin\bash.exe -lc "pacman --noconfirm -Syuu"
          C:\tools\msys64\usr\bin\bash.exe -lc "pacman --noconfirm -S base-devel mingw-w64-ucrt-x86_64-toolchain mingw-w64-ucrt-x86_64-libyaml"
          Write-Host '=== recompile openssl 3.3.3 with the UCRT toolchain ==='
          gem install openssl -v 3.3.3 --force
          Write-Host '--- openssl gem (after recompile) ---'; gem list openssl
          Write-Host '=== activation check: metanorma loads the openssl ~> 3.3.2 tree (was MissingSpecError) ==='
          metanorma --version
          Write-Host '=== AFTER (UCRT-recompiled openssl gem): fontist Down path ==='
          ruby C:/probe/down_test.rb
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            metanorma/metanorma:windows-ltsc2025 \
            powershell -ExecutionPolicy Bypass -File C:/probe/run.ps1
