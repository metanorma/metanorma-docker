name: build-push-windows

on:
  push:
    branches: [ main ]
    tags:
    - '*'
    paths:
      - 'Dockerfile.windows'
      - 'VERSION.mak'
      - 'Gemfile'
      - 'metanorma-windows/**'
      - '.github/workflows/build-push-windows.yml'
  pull_request:
    paths:
      - 'Dockerfile.windows'
      - 'VERSION.mak'
      - 'Gemfile'
      - 'metanorma-windows/**'
      - '.github/workflows/build-push-windows.yml'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.job }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: read

env:
  IMAGE_NAME: "metanorma/metanorma"

jobs:
  job_info:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.result }}
      head_tag: ${{ steps.check.outputs.head_tag }}
      foreign_pr: ${{ steps.check.outputs.foreign_pr }}
    steps:
    - uses: actions/checkout@v4
    - id: version
      run: |
        export CLI_VERSION=$(cat VERSION.mak | cut -d ' ' -f 3)
        echo "result=${CLI_VERSION}" >> $GITHUB_OUTPUT
    - name: Show version number
      run: echo ${{ steps.version.outputs.result }}
    - name: Retrieve tags
      run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*
    - name: Set output variables
      id: check
      run: |
        fpr="no"
        tag=""
        if [[ "${{ github.ref }}" == refs/heads/* ]]; then
          tag="$(git tag --points-at HEAD)"
        elif [[ "${{ github.ref }}" == refs/pull/* ]] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.event.pull_request.base.repo.full_name }}" ]; then
          fpr="yes"
        fi
        echo "foreign_pr=${fpr}" >> $GITHUB_OUTPUT
        echo "head_tag=${tag}" >> $GITHUB_OUTPUT

  build:
    name: Build Windows (${{ matrix.root_image.id }})
    runs-on: ${{ matrix.root_image.os }}
    needs: job_info
    if: (github.event_name == 'push' && needs.job_info.outputs.head_tag == '') || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      fail-fast: false
      matrix:
        root_image:
         - os: windows-2025
           id: ltsc2025
           base_image: "mcr.microsoft.com/windows/servercore:ltsc2025"
         - os: windows-2022
           id: ltsc2022
           base_image: "mcr.microsoft.com/windows/servercore:ltsc2022"
        experimental: [false]
        image_type: [metanorma]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: label_prefix
        env:
          IS_PRERELEASE: ${{matrix.image_type == 'mn'}}
          IS_MAIN: ${{matrix.image_type == 'metanorma' && matrix.root_image.id == 'ltsc2025'}}
        run: |
          if [ "$IS_MAIN" == "true" ]; then
            echo "result=" >> $GITHUB_OUTPUT
          elif [ "$IS_PRERELEASE" == "true" ]; then
            echo "result=prefix=pre-${{ matrix.root_image.id }}-,onlatest=true" >> $GITHUB_OUTPUT
          else
            echo "result=prefix=${{ matrix.root_image.id }}-,onlatest=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Show label prefix calculation
        run: echo ${{ steps.label_prefix.outputs.result }}
        shell: bash

      - name: Build Docker Image
        env:
          METANORMA_IMAGE_NAME: ${{ env.IMAGE_NAME }}:windows-${{ matrix.root_image.id }}
          METANORMA_VERSION: ${{ needs.job_info.outputs.version }}
        run: |
          docker build --pull --no-cache -t ${{ env.METANORMA_IMAGE_NAME }} -t ${{ env.METANORMA_IMAGE_NAME }}-${{ env.METANORMA_VERSION }} -t ghcr.io/${{ env.METANORMA_IMAGE_NAME }} -t ghcr.io/${{ env.METANORMA_IMAGE_NAME }}-${{ env.METANORMA_VERSION }} -f Dockerfile.windows --build-arg BASE_IMAGE=${{ matrix.root_image.base_image }} --label org.opencontainers.image.vendor="Ribose Inc." --label org.opencontainers.image.licenses="BSD-3-Clause" --label org.opencontainers.image.documentation="https://www.metanorma.org" --label org.opencontainers.image.ref.name="metanorma/${{ matrix.image_type }}:${{ matrix.root_image.id }}" --label org.opencontainers.image.base.name="${{ matrix.root_image.base_image }}" --label org.opencontainers.image.title="Metanorma official public image" --label org.opencontainers.image.description="Metanorma official public image on ${{ matrix.root_image.image }}" --label org.opencontainers.image.version="${{needs.job_info.outputs.version}}" .
        shell: bash

      - name: Compress image and export metadata to artifacts
        env:
          METANORMA_IMAGE_NAME: ${{ env.IMAGE_NAME }}:windows-${{ matrix.root_image.id }}
        run: |
          docker image save ${{ env.METANORMA_IMAGE_NAME }} | gzip > docker-image.tar.gz
          echo "${{ steps.meta.outputs.tags }}" > docker-tags.txt
          echo "${{ steps.meta.outputs.labels }}" > docker-labels.txt
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image_type }}-${{ matrix.root_image.id }}-${{ github.run_id }}
          path: docker-image.tar.gz
          retention-days: 1
      - uses: actions/upload-artifact@v4
        with:
          name: tags-${{ matrix.image_type }}-${{ matrix.root_image.id }}-${{ github.run_id }}
          path: docker-tags.txt
          retention-days: 1
      - uses: actions/upload-artifact@v4
        with:
          name: labels-${{ matrix.image_type }}-${{ matrix.root_image.id }}-${{ github.run_id }}
          path: docker-labels.txt
          retention-days: 1

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKER_LOGIN_USERNAME }}
          password: ${{ secrets.DOCKER_LOGIN_PASSWORD }}

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: metanorma-ci
          password: ${{ secrets.METANORMA_CI_PAT_TOKEN }}

      - name: Push Docker Image to Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          docker image push --all-tags ${{ env.IMAGE_NAME }}
        shell: pwsh

      - name: Push Docker Image to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          docker image push --all-tags ghcr.io/${{ env.IMAGE_NAME }}
        shell: bash

  samples-matrix:
    name: Samples matrix
    uses: metanorma/ci/.github/workflows/build-sample-matrix.yml@main
    with:
      smoke: false
      flavors-only: true
      public-only: true

  test-matrix:
    name: Test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    needs: samples-matrix
    steps:
      - name: Build full test matrix
        id: build
        run: |
          echo '{ "root_image": [ { "os": "windows-2025", "id": "ltsc2025", "base_image": "mcr.microsoft.com/windows/servercore:ltsc2025" } ], "experimental": [false], "image_type": ["metanorma"] }' > docker-matrix.json
          echo '${{ needs.samples-matrix.outputs.samples-matrix }}' > samples-matrix.json
          echo "matrix=$(jq -s add docker-matrix.json samples-matrix.json | tr '\n' ' ')" >> $GITHUB_OUTPUT
          echo '${{ needs.samples-matrix.outputs.samples-matrix }}'
          echo "matrix=$(jq -s add docker-matrix.json samples-matrix.json | tr '\n' ' ')"

  test:
    name: Test (${{ matrix.image_type }}-${{ matrix.root_image.id }}, ${{ matrix.flavor.id }})
    runs-on: ${{ matrix.root_image.os }}
    needs:
      - build
      - job_info
      - test-matrix
    continue-on-error: ${{ matrix.flavor.experimental || matrix.root_image.id == 'ltsc2025' }}
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix: ${{ fromJson(needs.test-matrix.outputs.matrix) }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.image_type }}-${{ matrix.root_image.id }}-${{ github.run_id }}

      - uses: actions/download-artifact@v4
        with:
          name: tags-${{ matrix.image_type }}-${{ matrix.root_image.id }}-${{ github.run_id }}

      - id: loaded_image
        name: Load image
        run: |
          ls -al
          docker load --input docker-image.tar.gz
          echo "full_name=$(head -n 1 docker-tags.txt)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Fetch samples (${{ matrix.flavor.id }})
        uses: actions/checkout@v4
        with:
          submodules: recursive
          repository: metanorma/mn-samples-${{ matrix.flavor.id }}
          token: ${{ secrets.METANORMA_CI_PAT_TOKEN }}
          path: ${{ github.workspace }}/samples
          fetch-depth: 1

      - name: Set config file
        id: config
        run: |
          if [ -f "${{ github.workspace }}/samples/metanorma.test.yml" ]; then
            echo "file=metanorma.test.yml" >> $GITHUB_OUTPUT
          else
            echo "file=metanorma.yml" >> $GITHUB_OUTPUT
          fi
        shell: bash

      # DIAGNOSTIC (temporary): pin the exact failure boundary in-container.
      # Runtime font/relaton downloads fail with Errno::ENOTSOCK at SSL_connect,
      # but ONLY via Ruby Net::HTTP; git.exe works. This probe localizes it:
      #  - tcp_connect           : does a plain TCP socket connect at all?
      #  - nethttp_default       : baseline (non-blocking connect path) -> expect FAIL
      #  - nethttp_open_timeout0 : blocking s.connect path (open_timeout=nil) -> KEY
      #  - openssl_blocking      : raw blocking OpenSSL connect
      #  - curl.exe              : native process control -> expect OK
      # Interpreting: open_timeout=nil OK => clean in-Ruby fix (non-blocking path);
      # all-Ruby FAIL but curl OK => environmental (Winsock), fontist must not change.
      - name: Probe socket connectivity (diagnostic)
        continue-on-error: true
        env:
          METANORMA_IMAGE_NAME: ${{ env.IMAGE_NAME }}:windows-${{ matrix.root_image.id }}
        run: |
          # Windows containers only support DIRECTORY bind mounts, not single
          # files, so put probe.rb in a dir and mount the dir.
          mkdir -p probe_dir
          cat > probe_dir/probe.rb <<'RUBY'
          require "net/http"; require "uri"; require "socket"; require "openssl"
          host = "github.com"; port = 443
          path = "/latofonts/lato-source/archive/refs/tags/v1.0.0.zip"
          t = lambda do |label, &blk|
            print "#{label}: "
            begin
              puts blk.call
            rescue => e
              puts "FAIL #{e.class}: #{e.message}"
            end
          end
          puts "ruby #{RUBY_VERSION} #{RUBY_PLATFORM}"
          t.call("tcp_connect")          { s = TCPSocket.new(host, port); s.close; "OK" }
          t.call("nethttp_default")      { Net::HTTP.start(host, port, use_ssl: true) { |h| h.head(path).code } }
          t.call("nethttp_open_timeout0") do
            h = Net::HTTP.new(host, port); h.use_ssl = true; h.open_timeout = nil
            h.start { h.head(path).code }
          end
          t.call("openssl_blocking") do
            tcp = TCPSocket.new(host, port)
            ssl = OpenSSL::SSL::SSLSocket.new(tcp); ssl.connect; ssl.close; "OK"
          end
          RUBY
          echo "----- ruby probe -----"
          MSYS_NO_PATHCONV=1 docker run --rm -v "$(pwd -W)/probe_dir:C:/probe" \
            ${{ env.METANORMA_IMAGE_NAME }} ruby C:/probe/probe.rb || true
          echo "----- curl probe (native process control) -----"
          MSYS_NO_PATHCONV=1 docker run --rm ${{ env.METANORMA_IMAGE_NAME }} \
            curl.exe -fsS -o NUL -w "curl: %{http_code}\n" \
            https://github.com/latofonts/lato-source/archive/refs/tags/v1.0.0.zip || true
        shell: bash

      - name: Run tests
        env:
          METANORMA_IMAGE_NAME: ${{ env.IMAGE_NAME }}:windows-${{ matrix.root_image.id }}
          IMAGE_NAME: ${{ steps.loaded_image.outputs.full_name }}
          CONFIG_FILE: ${{ steps.config.outputs.file }}
        run: |
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/samples:C:/metanorma" \
            -w C:/metanorma \
            ${{ env.METANORMA_IMAGE_NAME }} \
            metanorma site generate --strict --agree-to-terms -c ${{ env.CONFIG_FILE }} .
        shell: bash

  create-manifest:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: ${{ secrets.DOCKER_LOGIN_USERNAME }}
          password: ${{ secrets.DOCKER_LOGIN_PASSWORD }}

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: metanorma-ci
          password: ${{ secrets.METANORMA_CI_PAT_TOKEN }}

      - name: Push Docker Manifest to Docker Hub
        uses: Noelware/docker-manifest-action@0.4.3
        with:
          inputs: ${{ env.IMAGE_NAME }}:windows
          images: ${{ env.IMAGE_NAME }}:windows-ltsc2022,${{ env.IMAGE_NAME }}:windows-ltsc2025
          push: true

      - name: Push Docker Manifest to GitHub Container Registry
        uses: Noelware/docker-manifest-action@0.4.3
        if: github.event_name != 'pull_request'
        with:
          inputs: ghcr.io/${{ env.IMAGE_NAME }}:windows
          images: ghcr.io/${{ env.IMAGE_NAME }}:windows-ltsc2022,ghcr.io/${{ env.IMAGE_NAME }}:windows-ltsc2025
          push: true
