name: env-probe-path

# CONFIRMED root cause: Ruby is x64-mingw-ucrt (UCRT ABI), compiled against
# OpenSSL 3.6.3, but the build leaves a msvcrt OpenSSL 3.5.1 in Ruby's ext dir
# (ruby34\lib\ruby\3.4.0\x64-mingw-ucrt\) because the Dockerfile installs the
# mingw-w64-x86_64-* (MINGW64/msvcrt) toolchain for a UCRT Ruby. A msvcrt libssl
# handing sockets to a UCRT Ruby => Errno::ENOTSOCK on every HTTPS connect.
# This probe runs ON the published image (no 2h build):
#  - pin-ucrt-openssl-3.6.3 : install the PINNED matching UCRT OpenSSL 3.6.3-1
#    (mingw-w64-ucrt-x86_64-openssl, frozen URL on repo.msys2.org) over Ruby's
#    wrong 3.5.1, then run Net::HTTP. RESULT: 200 => the Dockerfile fix is to pin
#    this exact UCRT OpenSSL into Ruby (won't regress on rebuild).
# Delete once the fix is confirmed.
on:
  push:
    paths:
      - '.github/workflows/env-probe-path.yml'
  workflow_dispatch:

jobs:
  path-probe:
    name: "Path ${{ matrix.candidate.name }}"
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        candidate:
          - name: pin-ucrt-openssl-3.6.3
            ps: "$pkg='mingw-w64-ucrt-x86_64-openssl-3.6.3-1-any.pkg.tar.zst'; iwr ('https://repo.msys2.org/mingw/ucrt64/'+$pkg) -OutFile ('C:\\'+$pkg) -UseBasicParsing; New-Item -ItemType Directory -Force C:\\ossl | Out-Null; tar -xf ('C:\\'+$pkg) -C C:\\ossl; $ssl=(Get-ChildItem -Recurse C:\\ossl -Filter libssl-3-x64.dll | Select-Object -First 1).FullName; $cry=(Get-ChildItem -Recurse C:\\ossl -Filter libcrypto-3-x64.dll | Select-Object -First 1).FullName; Write-Host ('installing ssl=' + $ssl); Copy-Item $ssl,$cry 'C:\\tools\\ruby34\\lib\\ruby\\3.4.0\\x64-mingw-ucrt\\' -Force; ruby -ropenssl -e 'STDOUT.puts %q{LOADED_NOW: } + OpenSSL::OPENSSL_LIBRARY_VERSION'; ruby C:/probe/test.rb"
    steps:
      - name: Probe PATH/DLL hypothesis on the published image
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/test.rb <<'RUBY'
          require "net/http"
          require "uri"
          begin
            print "RESULT: "
            puts Net::HTTP.get_response(URI("https://github.com")).code
          rescue => e
            puts "FAIL #{e.class} - #{e.message}"
          end
          RUBY
          cat > probe_dir/fix.ps1 <<'PS1'
          $ErrorActionPreference = 'Continue'
          [Net.ServicePointManager]::SecurityProtocol = 3072
          ${{ matrix.candidate.ps }}
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            metanorma/metanorma:windows-ltsc2025 \
            powershell -ExecutionPolicy Bypass -File C:/probe/fix.ps1
