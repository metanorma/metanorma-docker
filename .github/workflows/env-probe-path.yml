name: env-probe-path

# NARROWED: a pristine Ruby ALONE works in the image (200), but pristine Ruby +
# the image's BUILT GEMS laid on top FAILS again (ENOTSOCK) while gems still load.
# => the poison is IN THE GEMS, not Ruby's core. Merely having it in GEM_PATH (not
# even requiring it) breaks core net/http -> almost certainly a msvcrt-built
# `openssl` gem in the gems dir shadowing Ruby's working default openssl.
# Also ruled out earlier: OpenSSL DLL version/ABI, PATH, the OS, Ruby core binaries.
# This probe isolates the poison on the published image (no 2h build):
#  - isolate-gems-poison : pristine Ruby + image gems => CONTROL (expect FAIL),
#    then remove the openssl gem and retest => MINUS-OPENSSL. MINUS-OPENSSL == 200
#    proves the openssl gem is the culprit (fix: build it with the UCRT toolchain,
#    or don't ship a separate openssl gem). GEMDLL/SPEC lines show what's present.
#  - compare-dlls : SHA256-diff image Ruby vs pristine (supporting insight).
# Delete once the fix is locked in.
on:
  push:
    paths:
      - '.github/workflows/env-probe-path.yml'
  workflow_dispatch:

jobs:
  path-probe:
    name: "Path ${{ matrix.candidate.name }}"
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        candidate:
          - name: image-minus-openssl-gem
            ps: "Write-Host 'IMAGE ruby baseline (openssl gem present):'; ruby C:/probe/test.rb; Get-ChildItem C:\\tools\\ruby34\\lib\\ruby\\gems\\3.4.0\\gems -Filter 'openssl-*' -Directory -ErrorAction SilentlyContinue | ForEach-Object { Remove-Item -Recurse -Force $_.FullName }; Get-ChildItem C:\\tools\\ruby34\\lib\\ruby\\gems\\3.4.0\\specifications -Filter 'openssl-*.gemspec' -ErrorAction SilentlyContinue | ForEach-Object { Remove-Item -Force $_.FullName }; Get-ChildItem C:\\tools\\ruby34\\lib\\ruby\\gems\\3.4.0\\extensions\\x64-mingw-ucrt\\3.4.0 -Filter 'openssl-*' -Directory -ErrorAction SilentlyContinue | ForEach-Object { Remove-Item -Recurse -Force $_.FullName }; Write-Host 'IMAGE ruby, openssl gem removed -> uses default openssl:'; ruby -ropenssl -e 'STDOUT.puts %q{DEFAULT_OPENSSL: } + OpenSSL::OPENSSL_LIBRARY_VERSION'; ruby C:/probe/test.rb"
          - name: compare-dlls
            ps: "$u='https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-3.4.9-1/rubyinstaller-3.4.9-1-x64.exe'; iwr $u -OutFile C:\\ri.exe -UseBasicParsing; Start-Process C:\\ri.exe -ArgumentList '/verysilent','/norestart','/suppressmsgboxes','/dir=C:\\fresh-ruby','/mergetasks=!ridkinstall' -Wait; $dlls=@('libssl-3-x64.dll','libcrypto-3-x64.dll','libwinpthread-1.dll','libgcc_s_seh-1.dll','libstdc++-6.dll','zlib1.dll','libffi-8.dll','x64-ucrt-ruby340.dll','ruby.exe','socket.so','openssl.so'); foreach ($d in $dlls) { $i=(Get-ChildItem -Recurse C:\\tools\\ruby34 -Filter $d -ErrorAction SilentlyContinue | Select-Object -First 1); $f=(Get-ChildItem -Recurse C:\\fresh-ruby -Filter $d -ErrorAction SilentlyContinue | Select-Object -First 1); $ih=if($i){(Get-FileHash $i.FullName -Algorithm SHA256).Hash.Substring(0,12)}else{'MISSING'}; $fh=if($f){(Get-FileHash $f.FullName -Algorithm SHA256).Hash.Substring(0,12)}else{'MISSING'}; $m=if($ih -eq $fh){'same'}else{'DIFF'}; Write-Host ($m + '  ' + $d + '  image=' + $ih + '  fresh=' + $fh + '  ipath=' + $(if($i){$i.FullName}else{'-'})) }"
    steps:
      - name: Probe PATH/DLL hypothesis on the published image
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/test.rb <<'RUBY'
          require "net/http"
          require "uri"
          begin
            print "RESULT: "
            puts Net::HTTP.get_response(URI("https://github.com")).code
          rescue => e
            puts "FAIL #{e.class} - #{e.message}"
          end
          RUBY
          cat > probe_dir/gemcheck.rb <<'RUBY'
          begin
            require "fontist"
            require "nokogiri"
            puts "GEMS_LOAD: OK"
          rescue Exception => e
            puts "GEMS_LOAD: FAIL #{e.class} - #{e.message}"
          end
          RUBY
          cat > probe_dir/fix.ps1 <<'PS1'
          $ErrorActionPreference = 'Continue'
          [Net.ServicePointManager]::SecurityProtocol = 3072
          ${{ matrix.candidate.ps }}
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            metanorma/metanorma:windows-ltsc2025 \
            powershell -ExecutionPolicy Bypass -File C:/probe/fix.ps1
