name: env-probe-path

# RULED OUT (proven on the published image): OpenSSL version AND ABI (pinned UCRT
# 3.6.3 still FAILs), PATH ordering, the OS (bare ltsc2025 + fresh Ruby works).
# CONFIRMED class #1: a pristine RubyInstaller works inside the image while the
# image's built/copied Ruby fails -> the build corrupts Ruby, not the environment.
# The only PROVEN-good Ruby is a pristine one. A toolchain change can only be
# verified by the 2h build, so instead this probe PROVES the real fix cheaply on
# the published image BEFORE we touch the Dockerfile:
#  - prove-pristine-plus-gems : install a pristine Ruby, lay the image's built gems
#    on top, then run Net::HTTP AND require the native gems. RESULT: 200 plus
#    GEMS_LOAD: OK  => "ship a pristine Ruby + copy the gems" is a verified fix.
#  - compare-dlls : SHA256-diff image Ruby vs pristine to show what the build mangled.
# Delete once the fix is locked in.
on:
  push:
    paths:
      - '.github/workflows/env-probe-path.yml'
  workflow_dispatch:

jobs:
  path-probe:
    name: "Path ${{ matrix.candidate.name }}"
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        candidate:
          - name: prove-pristine-plus-gems
            ps: "$u='https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-3.4.9-1/rubyinstaller-3.4.9-1-x64.exe'; iwr $u -OutFile C:\\ri.exe -UseBasicParsing; Start-Process C:\\ri.exe -ArgumentList '/verysilent','/norestart','/suppressmsgboxes','/dir=C:\\fresh-ruby','/mergetasks=!ridkinstall' -Wait; robocopy C:\\tools\\ruby34\\lib\\ruby\\gems C:\\fresh-ruby\\lib\\ruby\\gems /E /NFL /NDL /NJH /NJS /NP | Out-Null; Write-Host ('pristine+gems ruby: ' + (& C:\\fresh-ruby\\bin\\ruby.exe -v)); & C:\\fresh-ruby\\bin\\ruby.exe C:/probe/test.rb; & C:\\fresh-ruby\\bin\\ruby.exe C:/probe/gemcheck.rb"
          - name: compare-dlls
            ps: "$u='https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-3.4.9-1/rubyinstaller-3.4.9-1-x64.exe'; iwr $u -OutFile C:\\ri.exe -UseBasicParsing; Start-Process C:\\ri.exe -ArgumentList '/verysilent','/norestart','/suppressmsgboxes','/dir=C:\\fresh-ruby','/mergetasks=!ridkinstall' -Wait; $dlls=@('libssl-3-x64.dll','libcrypto-3-x64.dll','libwinpthread-1.dll','libgcc_s_seh-1.dll','libstdc++-6.dll','zlib1.dll','libffi-8.dll','x64-ucrt-ruby340.dll','ruby.exe','socket.so','openssl.so'); foreach ($d in $dlls) { $i=(Get-ChildItem -Recurse C:\\tools\\ruby34 -Filter $d -ErrorAction SilentlyContinue | Select-Object -First 1); $f=(Get-ChildItem -Recurse C:\\fresh-ruby -Filter $d -ErrorAction SilentlyContinue | Select-Object -First 1); $ih=if($i){(Get-FileHash $i.FullName -Algorithm SHA256).Hash.Substring(0,12)}else{'MISSING'}; $fh=if($f){(Get-FileHash $f.FullName -Algorithm SHA256).Hash.Substring(0,12)}else{'MISSING'}; $m=if($ih -eq $fh){'same'}else{'DIFF'}; Write-Host ($m + '  ' + $d + '  image=' + $ih + '  fresh=' + $fh + '  ipath=' + $(if($i){$i.FullName}else{'-'})) }"
    steps:
      - name: Probe PATH/DLL hypothesis on the published image
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/test.rb <<'RUBY'
          require "net/http"
          require "uri"
          begin
            print "RESULT: "
            puts Net::HTTP.get_response(URI("https://github.com")).code
          rescue => e
            puts "FAIL #{e.class} - #{e.message}"
          end
          RUBY
          cat > probe_dir/gemcheck.rb <<'RUBY'
          begin
            require "fontist"
            require "nokogiri"
            puts "GEMS_LOAD: OK"
          rescue Exception => e
            puts "GEMS_LOAD: FAIL #{e.class} - #{e.message}"
          end
          RUBY
          cat > probe_dir/fix.ps1 <<'PS1'
          $ErrorActionPreference = 'Continue'
          [Net.ServicePointManager]::SecurityProtocol = 3072
          ${{ matrix.candidate.ps }}
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            metanorma/metanorma:windows-ltsc2025 \
            powershell -ExecutionPolicy Bypass -File C:/probe/fix.ps1
