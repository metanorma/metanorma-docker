name: env-probe-path

# RULED OUT (proven on the published image): OpenSSL version AND ABI. Installing
# the exact matching UCRT OpenSSL 3.6.3 (LOADED_NOW confirmed) STILL fails with
# Errno::ENOTSOCK. Also ruled out: PATH ordering, the OS (bare ltsc2025 + fresh
# Ruby works). Plain TCP works; only OpenSSL's own Winsock calls hit ENOTSOCK.
# So the image breaks the socket-fd -> SOCKET-handle handoff for TLS. Two classes
# remain: (a) the copied/built Ruby is corrupted, or (b) the image environment.
# This probe runs ON the published image (no 2h build) to discriminate:
#  - pristine-ruby-in-image : install a fresh RubyInstaller (own complete DLL set)
#    into the image, run Net::HTTP. 200 => copied/built Ruby is broken (fix build);
#    FAIL => the environment is broken (bisect installed components).
#  - image-ruby-baseline    : the image's own Ruby, expect FAIL (same-run control).
# Delete once the culprit is found.
on:
  push:
    paths:
      - '.github/workflows/env-probe-path.yml'
  workflow_dispatch:

jobs:
  path-probe:
    name: "Path ${{ matrix.candidate.name }}"
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        candidate:
          - name: pristine-ruby-in-image
            ps: "$u='https://github.com/oneclick/rubyinstaller2/releases/download/RubyInstaller-3.4.9-1/rubyinstaller-3.4.9-1-x64.exe'; iwr $u -OutFile C:\\ri.exe -UseBasicParsing; Start-Process C:\\ri.exe -ArgumentList '/verysilent','/norestart','/suppressmsgboxes','/dir=C:\\fresh-ruby','/mergetasks=!ridkinstall' -Wait; if (Test-Path C:\\fresh-ruby\\bin\\ruby.exe) { Write-Host ('fresh ruby: ' + (& C:\\fresh-ruby\\bin\\ruby.exe -v)); & C:\\fresh-ruby\\bin\\ruby.exe C:/probe/test.rb } else { Write-Host 'FRESH RUBY INSTALL FAILED' }"
          - name: image-ruby-baseline
            ps: "ruby C:/probe/test.rb"
    steps:
      - name: Probe PATH/DLL hypothesis on the published image
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/test.rb <<'RUBY'
          require "net/http"
          require "uri"
          begin
            print "RESULT: "
            puts Net::HTTP.get_response(URI("https://github.com")).code
          rescue => e
            puts "FAIL #{e.class} - #{e.message}"
          end
          RUBY
          cat > probe_dir/fix.ps1 <<'PS1'
          $ErrorActionPreference = 'Continue'
          [Net.ServicePointManager]::SecurityProtocol = 3072
          ${{ matrix.candidate.ps }}
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            metanorma/metanorma:windows-ltsc2025 \
            powershell -ExecutionPolicy Bypass -File C:/probe/fix.ps1
