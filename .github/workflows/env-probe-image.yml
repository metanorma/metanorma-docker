name: env-probe-image

# Isolates WHERE the ENOTSOCK is triggered inside the metanorma ltsc2025 IMAGE
# (the env-probe proved bare ltsc2025 + Ruby works). Pulls the published image and
# runs ONE Net::HTTP HTTPS call from the image's own (copied) Ruby, then a second
# call AFTER require "fontist" (loads the gem stack + native exts).
#  - RESULT_MINIMAL FAIL        -> the copied Ruby itself is broken (build/COPY)
#  - MINIMAL ok, AFTER_FONTIST FAIL -> loading the gem stack breaks sockets
#  - both ok                    -> trigger is deeper in the site-generate workload
# Auto-runs on push of THIS file. Delete once the trigger is found.
on:
  push:
    paths:
      - '.github/workflows/env-probe-image.yml'
  workflow_dispatch:

jobs:
  exp3-metanorma-image:
    name: "Exp3 metanorma ltsc2025 image (minimal + after-fontist)"
    runs-on: windows-2025
    steps:
      - name: Probe the built image's Ruby (no metanorma build — just a docker pull + run)
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/test.rb <<'RUBY'
          require "net/http"
          require "uri"
          def get
            Net::HTTP.get_response(URI("https://github.com")).code
          end
          begin
            print "RESULT_MINIMAL: "
            puts get
          rescue => e
            puts "FAIL #{e.class} - #{e.message}"
          end
          begin
            require "fontist"
            print "RESULT_AFTER_FONTIST: "
            puts get
          rescue => e
            puts "FAIL #{e.class} - #{e.message}"
          end
          RUBY
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            metanorma/metanorma:windows-ltsc2025 \
            ruby C:/probe/test.rb
