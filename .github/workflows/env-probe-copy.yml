name: env-probe-copy

# Fix-finder for the metanorma-image ENOTSOCK (proven: the image's COPY'd Ruby
# fails Net::HTTP, a fresh-installed Ruby works). Runs ON the already-published
# image (no 2h build) and tries candidate fixes IN it, then a minimal Net::HTTP:
#  - baseline       : no fix      -> expect RESULT: FAIL (control)
#  - vcredist140    : install VC++ runtime (likely missing system dep)
#  - ruby-reinstall : choco reinstall Ruby over the copy (proven-good install)
# Whichever prints RESULT: 200 is the minimal Dockerfile fix. Delete after.
on:
  push:
    paths:
      - '.github/workflows/env-probe-copy.yml'
  workflow_dispatch:

jobs:
  fix-finder:
    name: "Fix ${{ matrix.candidate.name }}"
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        candidate:
          - name: baseline
            pre: "Write-Host 'no fix applied'"
          - name: vcredist140
            pre: "choco install -y vcredist140 | Out-Null"
          - name: ruby-reinstall
            pre: "choco install -y ruby --version=3.4.9.1 --force | Out-Null; refreshenv"
    steps:
      - name: Try fix in the published image, then minimal Net::HTTP
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p probe_dir
          cat > probe_dir/test.rb <<'RUBY'
          require "net/http"
          require "uri"
          begin
            print "RESULT: "
            puts Net::HTTP.get_response(URI("https://github.com")).code
          rescue => e
            puts "FAIL #{e.class} - #{e.message}"
          end
          RUBY
          cat > probe_dir/fix.ps1 <<'PS1'
          $ErrorActionPreference = 'Continue'
          [Net.ServicePointManager]::SecurityProtocol = 3072
          ${{ matrix.candidate.pre }}
          ruby C:/probe/test.rb
          PS1
          MSYS_NO_PATHCONV=1 docker run --rm \
            -v "$(pwd -W)/probe_dir:C:/probe" \
            metanorma/metanorma:windows-ltsc2025 \
            powershell -ExecutionPolicy Bypass -File C:/probe/fix.ps1
